services:
  postgres:
    image: postgres:16-alpine
    container_name: crowdplay-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crowdplay
      POSTGRES_PASSWORD: crowdplay
      POSTGRES_DB: crowdplay
    volumes:
      - crowdplay_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdplay -d crowdplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crowdplay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - crowdplay_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crowdplay_pg_data:
  crowdplay_redis_data:
